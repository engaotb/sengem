<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Senjem Mobile - لعبة الأسئلة الهندسية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="mobile-container">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <div class="header-content">
                <button class="menu-button" onclick="toggleMenu()">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="mobile-title">Senjem</h1>
                <button class="reset-button" onclick="resetGame()">
                    <i data-lucide="rotate-ccw"></i>
                </button>
            </div>
        </header>
        
        <!-- Mobile Menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="menu-header">
                <h3>القائمة</h3>
                <button class="close-menu" onclick="toggleMenu()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="menu-content">
                <div class="teams-section">
                    <h4>الفرق</h4>
                    <div class="mobile-teams" id="mobileTeams">
                        <!-- الفرق ستظهر هنا -->
                    </div>
                </div>
                <div class="stats-section">
                    <h4>الإحصائيات</h4>
                    <div class="mobile-stats" id="mobileStats">
                        <!-- الإحصائيات ستظهر هنا -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content Area -->
        <main class="mobile-content" id="mobileContent">
            <!-- Team Selection Screen -->
            <div class="team-selection-screen" id="teamSelectionScreen">
                <h2>اختر الفريق</h2>
                <div class="team-buttons" id="teamButtons">
                    <!-- أزرار الفرق -->
                </div>
            </div>
            
            <!-- Categories Screen -->
            <div class="categories-screen" id="categoriesScreen" style="display: none;">
                <div class="categories-header">
                    <button class="back-button" onclick="showTeamSelection()">
                        <i data-lucide="arrow-left"></i>
                    </button>
                    <h2>اختر التخصص</h2>
                </div>
                <div class="categories-grid" id="categoriesGrid">
                    <!-- التخصصات ستظهر هنا -->
                </div>
            </div>
            
            <!-- Question Screen -->
            <div class="question-screen" id="questionScreen" style="display: none;">
                <div class="question-header">
                    <button class="back-button" onclick="showCategories()">
                        <i data-lucide="arrow-left"></i>
                    </button>
                    <div class="question-info">
                        <span class="category-name" id="categoryName"></span>
                        <span class="question-points" id="questionPoints"></span>
                    </div>
                </div>
                
                <div class="question-content">
                    <div class="question-image-container" id="questionImageContainer">
                        <!-- صورة السؤال -->
                    </div>
                    <div class="question-text" id="questionText">
                        <!-- نص السؤال -->
                    </div>
                </div>
                
                <div class="question-actions">
                    <button class="action-btn primary" onclick="revealAnswer()" id="revealBtn">
                        <i data-lucide="eye"></i> إظهار الإجابة
                    </button>
                    <div class="answer-buttons" id="answerButtons" style="display: none;">
                        <button class="action-btn success" onclick="markCorrect()">
                            <i data-lucide="check"></i> صحيح
                        </button>
                        <button class="action-btn danger" onclick="markIncorrect()">
                            <i data-lucide="x"></i> خاطئ
                        </button>
                    </div>
                </div>
                
                <div class="answer-section" id="answerSection" style="display: none;">
                    <div class="answer-text" id="answerText">
                        <!-- الإجابة -->
                    </div>
                </div>
            </div>
        </main>
        
        <!-- Mobile Footer -->
        <footer class="mobile-footer">
            <div class="active-team-info" id="activeTeamInfo">
                <!-- معلومات الفريق النشط -->
            </div>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
